# AdGuard Home — network-wide DNS ad blocker (rancher-syd-prod only).
#
# Architecture:
#   - Deployment replicas: 1, pod network (no hostNetwork), ClusterIP Service
#   - Plain DNS UDP: Traefik DaemonSet hostPort :53 → entrypoint 5353 → UDPRoute → Service :53
#   - Dashboard / DoH: Ingress (Traefik HTTP/HTTPS)
#   - PVC for conf/work
#
# Endpoints:
#   DNS plain:      any Traefik node IP :53 (UDP) → AdGuard
#   DNS-over-TLS:   (pod :853; not fronted by Traefik yet)
#   Dashboard:      https://adguard.sigaint.au/
#   DNS-over-HTTPS: https://dns.adguard.sigaint.au/dns-query
#
# Host firewall — on every Traefik (ingress) node:
#
#   sudo firewall-cmd --permanent --zone=public --add-port=53/udp
#   sudo firewall-cmd --reload
#
# Prerequisites:
#   - Gateway API experimental CRDs (UDPRoute v1alpha2)
#   - Traefik providers.kubernetesGateway.experimentalChannel: true
#   - Traefik gateway listener "dns" port 53 UDP (see traefik values)
#
# Verify:
#   kubectl -n adguard get deploy,svc,udproute
#   kubectl -n traefik get gateway traefik-gateway -o yaml
#   dig @<traefik-node-ip> -p 53 example.com +time=2
defaultNamespace: adguard
labels:
  component: adguard

targetCustomizations:
  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: rancher-syd-prod
    kustomize:
      dir: base
    dependsOn:
      - selector:
          matchLabels:
            component: traefik-install

  # Sydney only; LHM and other clusters are excluded.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
