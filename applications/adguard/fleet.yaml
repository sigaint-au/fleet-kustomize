# AdGuard Home — network-wide DNS ad blocker (rancher-syd-prod only).
#
# Architecture (one instance, all nodes accept DNS):
#   Client → any node :53 / :853
#         → firewalld DNAT → NodePort 30053 / 30853
#         → kube-proxy (externalTrafficPolicy: Cluster)
#         → single AdGuard Deployment pod (+ RWO PVC)
#
# Do not: DaemonSet AdGuard, hostNetwork, externalTrafficPolicy: Local,
#         or --add-port for 30053/30853 on the host firewall.
#
# Endpoints:
#   DNS plain:      any node IP :53   (NAT → NodePort 30053 TCP/UDP)
#   DNS-over-TLS:   any node IP :853  (NAT → NodePort 30853 TCP)
#                   cert in pod; server name dns.adguard.sigaint.au
#   Dashboard:      https://adguard.sigaint.au/  (port 3000 via Ingress)
#   DNS-over-HTTPS: https://dns.adguard.sigaint.au/dns-query
#
# Host firewall (firewalld) — apply on EVERY node:
#
#   sudo firewall-cmd --permanent --add-masquerade
#
#   sudo firewall-cmd --permanent --add-rich-rule='rule family="ipv4" forward-port port="53" protocol="udp" to-port="30053"'
#   sudo firewall-cmd --permanent --add-rich-rule='rule family="ipv4" forward-port port="53" protocol="tcp" to-port="30053"'
#   sudo firewall-cmd --permanent --add-rich-rule='rule family="ipv4" forward-port port="853" protocol="tcp" to-port="30853"'
#
#   # Optional IPv6
#   sudo firewall-cmd --permanent --add-rich-rule='rule family="ipv6" forward-port port="53" protocol="udp" to-port="30053"'
#   sudo firewall-cmd --permanent --add-rich-rule='rule family="ipv6" forward-port port="53" protocol="tcp" to-port="30053"'
#   sudo firewall-cmd --permanent --add-rich-rule='rule family="ipv6" forward-port port="853" protocol="tcp" to-port="30853"'
#
#   sudo firewall-cmd --reload
#
# Verify (replace NODE with each node IP):
#   kubectl -n adguard get deploy,pods,svc,ep
#   dig @NODE -p 53 example.com +time=2
#   # NodePort may not show in ss (iptables/eBPF); empty ss is OK.
#
# If DNATed traffic is dropped (some firewalld backends), fall back to direct
# rules that ACCEPT only -m conntrack --ctstate DNAT on 30053/30853.
defaultNamespace: adguard
labels:
  component: adguard

targetCustomizations:
  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: rancher-syd-prod
    kustomize:
      dir: base

  # Sydney only; LHM and other clusters are excluded.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
