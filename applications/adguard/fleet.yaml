# AdGuard Home — network-wide DNS ad blocker (rancher-syd-prod only).
#
# Architecture (hostNetwork :53/:853 + ClusterIP Service + shared RWX):
#   - Deployment replicas: 3, hostNetwork: true, pod anti-affinity (1 per node)
#   - AdGuard binds host :53 (DNS) and :853 (DoT) on each pod's node
#   - ClusterIP Service ports 53/853/3000 for Ingress and in-cluster access
#   - RWX PVC (longhorn) for shared conf/work
#
# External clients: dig @<pod-node-ip> (port 53). Point DHCP at node IPs that
# run AdGuard pods. (NodePort 53/853 is rejected by default apiserver range.)
#
# Endpoints:
#   DNS plain:      each pod node IP :53
#   DNS-over-TLS:   each pod node IP :853  (server name dns.adguard.sigaint.au)
#   Dashboard:      https://adguard.sigaint.au/  (port 3000 via Ingress)
#   DNS-over-HTTPS: https://dns.adguard.sigaint.au/dns-query
#
# Host firewall — on every node that runs an AdGuard pod:
#
#   sudo firewall-cmd --permanent --zone=public --add-port=53/udp
#   sudo firewall-cmd --permanent --zone=public --add-port=53/tcp
#   sudo firewall-cmd --permanent --zone=public --add-port=853/tcp
#   sudo firewall-cmd --reload
#
# Verify:
#   kubectl -n adguard get deploy,pods,svc -o wide
#   dig @<pod-node-ip> -p 53 example.com +time=2
#   ss -ulnp | grep ':53'   # on a pod node — should show AdGuard
defaultNamespace: adguard
labels:
  component: adguard

targetCustomizations:
  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: rancher-syd-prod
    kustomize:
      dir: base

  # Sydney only; LHM and other clusters are excluded.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
