# AdGuard Home — network-wide DNS ad blocker (rancher-syd-prod only).
#
# Architecture (hostNetwork + NodePort + shared RWX):
#   - Deployment replicas: 3, hostNetwork: true, pod anti-affinity (1 per node)
#   - Each pod binds host :53 / :853 / :3000 on its node
#   - NodePort Service (nodePort 53 / 853, externalTrafficPolicy: Cluster)
#   - RWX PVC (longhorn) for shared conf/work
#
# Cluster prerequisite: service-node-port-range must include 53-853
# (RKE2/kube-apiserver default is 30000-32767 — widen it or this Service will fail).
#
# Do not: schedule two hostNetwork pods on one node, or externalTrafficPolicy: Local.
# Note: multiple AdGuard processes sharing conf is best-effort (avoid concurrent UI edits).
#
# Endpoints:
#   DNS plain:      any node IP :53
#   DNS-over-TLS:   any node IP :853
#                   cert in pod; server name dns.adguard.sigaint.au
#   Dashboard:      https://adguard.sigaint.au/  (port 3000 via Ingress)
#   DNS-over-HTTPS: https://dns.adguard.sigaint.au/dns-query
#
# Host firewall — on every node that should accept client DNS/DoT:
#
#   sudo firewall-cmd --permanent --zone=public --add-port=53/udp
#   sudo firewall-cmd --permanent --zone=public --add-port=53/tcp
#   sudo firewall-cmd --permanent --zone=public --add-port=853/tcp
#   sudo firewall-cmd --reload
#
# Verify:
#   kubectl -n adguard get deploy,pods,svc,ep -o wide
#   dig @<any-node-ip> -p 53 example.com +time=2
defaultNamespace: adguard
labels:
  component: adguard

targetCustomizations:
  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: rancher-syd-prod
    kustomize:
      dir: base

  # Sydney only; LHM and other clusters are excluded.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
