apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adguard

labels:
  - pairs:
      app.kubernetes.io/name: adguard
      app.kubernetes.io/part-of: adguard
    includeSelectors: false

resources:
  # Shared default-deny ingress + same-namespace + Traefik namespace allow.
  # Use resources: (not components:) — Fleet cannot apply kind: Component.
  - ../../components/network-policy-baseline
  - namespace.yaml
  - pvc.yaml
  - certificate.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingressroute-udp.yaml
  - networkpolicy-dns.yaml
  - networkpolicy-http-from-nodes.yaml
