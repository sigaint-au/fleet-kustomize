apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adguard

labels:
  - pairs:
      app.kubernetes.io/name: adguard
      app.kubernetes.io/part-of: adguard
    includeSelectors: false

# All resources must live under applications/adguard/ — Fleet packages each
# fleet.yaml directory as an isolated bundle (no ../../components paths).
resources:
  - namespace.yaml
  - pvc.yaml
  - certificate.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingressroute-udp.yaml
  - networkpolicy-baseline.yaml
  - networkpolicy-dns.yaml
  - networkpolicy-http-from-nodes.yaml
