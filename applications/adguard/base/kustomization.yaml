apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: adguard

labels:
  - pairs:
      app.kubernetes.io/name: adguard
      app.kubernetes.io/part-of: adguard
    includeSelectors: false

resources:
  - namespace.yaml
  - pvc.yaml
  - certificate.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingressroute-udp.yaml
