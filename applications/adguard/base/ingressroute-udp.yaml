# Plain DNS (UDP) via Traefik IngressRouteUDP.
# Entrypoint "dns" = host :53 → container :5353 (see traefik values).
# port must match Service port name (dns-udp), not ambiguous numeric 53 (TCP+UDP).
apiVersion: traefik.io/v1alpha1
kind: IngressRouteUDP
metadata:
  name: adguard-dns
spec:
  entryPoints:
    - dns
  routes:
    - services:
        - name: adguard
          port: dns-udp
