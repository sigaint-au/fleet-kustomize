# Dashboard UI
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard
  annotations:
    cert-manager.io/cluster-issuer: le-production
spec:
  tls:
    - hosts:
        - adguard.sigaint.au
      secretName: adguard-sigaint-au-tls
  rules:
    - host: adguard.sigaint.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adguard
                port:
                  number: 3000
---
# DNS-over-HTTPS — clients: https://dns.adguard.sigaint.au/dns-query
# TLS terminates at Traefik; AdGuard serves plain DoH when allow_unencrypted_doh is enabled.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguard-doh
spec:
  tls:
    - hosts:
        - dns.adguard.sigaint.au
      secretName: adguard-dns-tls
  rules:
    - host: dns.adguard.sigaint.au
      http:
        paths:
          - path: /dns-query
            pathType: Prefix
            backend:
              service:
                name: adguard
                port:
                  number: 3000
