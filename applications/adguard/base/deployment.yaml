apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard
spec:
  replicas: 1
  # RWO PVC cannot be multi-attached across nodes.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: adguard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adguard
    spec:
      containers:
        - name: adguardhome
          image: adguard/adguardhome:v0.107.78
          imagePullPolicy: IfNotPresent
          # Must include -c/-w: K8s `args` replaces image CMD, which otherwise
          # points conf at the PVC. Without them, config is written next to the
          # binary (/opt/adguardhome/) and is lost on every restart (setup wizard).
          args:
            - --no-check-update
            - -c
            - /opt/adguardhome/conf/AdGuardHome.yaml
            - -w
            - /opt/adguardhome/work
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            # Dashboard + unencrypted DoH backend (Traefik terminates TLS for DoH).
            - name: http
              containerPort: 3000
              protocol: TCP
            # DNS-over-TLS (NodePort 30853; host :853 via firewall-cmd NAT).
            - name: dot
              containerPort: 853
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: data
              mountPath: /opt/adguardhome/work
              subPath: work
            - name: data
              mountPath: /opt/adguardhome/conf
              subPath: conf
            # cert-manager Secret (dns.adguard.sigaint.au) for DoT in AdGuard.
            # In Encryption settings use:
            #   certificate: /opt/adguardhome/certs/tls.crt
            #   private key: /opt/adguardhome/certs/tls.key
            #   server name: dns.adguard.sigaint.au
            #   DoT port: 853
            #   enable "Allow unencrypted DoH" (Traefik fronts DoH)
            # Do not bind AdGuard HTTPS on 443 — Traefik already owns host :443.
            - name: tls
              mountPath: /opt/adguardhome/certs
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: adguard-data
        - name: tls
          secret:
            secretName: adguard-dns-tls
