apiVersion: v1
kind: Service
metadata:
  name: adguard
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: adguard
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    # Dashboard / unencrypted DoH backend (Traefik terminates TLS for DoH).
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: dot
      port: 853
      targetPort: 853
      protocol: TCP
