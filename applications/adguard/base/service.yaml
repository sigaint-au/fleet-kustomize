apiVersion: v1
kind: Service
metadata:
  name: adguard
spec:
  type: NodePort
  # Cluster = every node can forward to the one pod (do not use Local).
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: adguard
  ports:
    # DNS — NodePort 30053. On each node: firewalld rich-rule :53 → :30053
    # (see fleet.yaml). Do not --add-port 30053 on the host firewall.
    - name: dns-tcp
      port: 53
      targetPort: 53
      nodePort: 30053
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      nodePort: 30053
      protocol: UDP
    # Dashboard / setup UI (also unencrypted DoH backend when allow_unencrypted_doh is on).
    # Prefer Ingress https://adguard.sigaint.au/; random NodePort is debug-only.
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    # DNS-over-TLS — NodePort 30853. Host :853 → :30853 via firewalld (fleet.yaml).
    - name: dot
      port: 853
      targetPort: 853
      nodePort: 30853
      protocol: TCP
