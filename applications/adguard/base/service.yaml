apiVersion: v1
kind: Service
metadata:
  name: adguard
spec:
  type: NodePort
  # Cluster = every node can forward NodePort traffic to the hostNetwork pod
  # (even when AdGuard is not scheduled on that node). Do not use Local.
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: adguard
  ports:
    # DNS — hostNetwork binds :53 on the pod's node; NodePort covers other nodes.
    - name: dns-tcp
      port: 53
      targetPort: 53
      nodePort: 30053
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      nodePort: 30053
      protocol: UDP
    # Dashboard / setup UI (also unencrypted DoH backend when allow_unencrypted_doh is on).
    # Prefer Ingress https://adguard.sigaint.au/.
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    # DNS-over-TLS — host :853 on the pod's node; NodePort 30853 elsewhere.
    - name: dot
      port: 853
      targetPort: 853
      nodePort: 30853
      protocol: TCP
