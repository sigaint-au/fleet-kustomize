apiVersion: v1
kind: Service
metadata:
  name: adguard
spec:
  type: NodePort
  # Cluster = every node can forward NodePort traffic to hostNetwork pods.
  # Do not use Local.
  # Requires apiserver/kube-proxy service-node-port-range to include 53 and 853
  # (default is 30000-32767).
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: adguard
  ports:
    # DNS — hostNetwork + NodePort both on 53.
    - name: dns-tcp
      port: 53
      targetPort: 53
      nodePort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      nodePort: 53
      protocol: UDP
    # Dashboard / setup UI (also unencrypted DoH backend when allow_unencrypted_doh is on).
    # Prefer Ingress https://adguard.sigaint.au/.
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    # DNS-over-TLS — hostNetwork + NodePort both on 853.
    - name: dot
      port: 853
      targetPort: 853
      nodePort: 853
      protocol: TCP
