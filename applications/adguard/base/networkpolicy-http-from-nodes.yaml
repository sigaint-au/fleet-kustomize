# HTTP/DoH backend (TCP 3000) for Traefik Ingress.
#
# rancher-syd-prod Traefik uses hostNetwork. Observed source IPs:
#   - Same node as backend: node InternalIP / VIP (e.g. 139.99.210.89)
#   - Cross-node via flannel wireguard: flannel-wg address (10.42.x.0/32),
#     NOT the node public IP — so node-IP-only allows caused intermittent 502s.
#
# AdGuard UI/DoH is intentionally public (Ingress + NodePort 31073), so allow
# any source on 3000. DNS 53/853 already allow 0.0.0.0/0 separately.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-adguard-http-from-nodes
  labels:
    sigaint.au/network-policy: app
    app.kubernetes.io/name: adguard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: adguard
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
        - ipBlock:
            cidr: ::/0
      ports:
        - protocol: TCP
          port: 3000
