apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-traefik
  labels:
    sigaint.au/network-policy: baseline
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Traefik on pod network / LoadBalancer (k3s-lhm-*).
        # hostNetwork Traefik (rancher-syd-prod) does NOT match this rule —
        # pair with app-specific node ipBlock allows.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
