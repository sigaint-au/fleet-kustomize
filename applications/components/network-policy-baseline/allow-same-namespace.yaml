apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace-ingress
  labels:
    sigaint.au/network-policy: baseline
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Any pod in this namespace (intra-app traffic).
        - podSelector: {}
