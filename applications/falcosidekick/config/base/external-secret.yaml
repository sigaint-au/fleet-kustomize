apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: falcosidekick-ui
  namespace: falco
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: falcosidekick-webui
    creationPolicy: Owner
  data:
    # Combined "login:password" for webui basic auth (format expected by the chart: <login>:<password>)
    # Sourced from FALCOSIDEKICK_UI_USER in the falcosidekick-ui secret (via Doppler)
    - secretKey: FALCOSIDEKICK_UI_USER
      remoteRef:
        key: FALCOSIDEKICK_WEBUI_USER
    # Password for the Redis instance backing Falcosidekick-UI (used when webui.redis.existingSecret is set)
    - secretKey: redis-password
      remoteRef:
        key: FALCOSIDEKICK_WEBUI_REDIS_PASSWORD
