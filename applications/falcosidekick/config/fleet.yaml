# fleet.yaml for supporting resources (ExternalSecret for webui credentials + redis password)
#
# This bundle should be targeted separately from the main Helm chart.
#
# The main falcosidekick Helm chart depends on this bundle via component: falcosidekick-config.
#
# This bundle creates:
#   - falco namespace (via defaultNamespace + resources)
#   - falcosidekick-ui secret (webui basic auth user + redis password) pulled from Doppler
#
# Doppler keys expected:
#   - FALCOSIDEKICK_UI_USER              (value in "login:password" format)  -- for the UI password in falcosidekick-ui secret
#   - FALCOSIDEKICK_WEBUI_REDIS_PASSWORD (password for the UI's Redis backend)
#
# The webui can be further configured (or main falcosidekick outputs) by extending
# this ExternalSecret and setting config.existingSecret / webui.*.existingSecret in values.

defaultNamespace: falco
labels:
  component: falcosidekick-config

targetCustomizations:
  - name: k3s-lhm-clusters
    clusterSelector:
      matchExpressions:
        - key: sigaint.au/cluster-id
          operator: In
          values:
            - k3s-lhm-prod
            - k3s-lhm-devel
    kustomize:
      dir: base

  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
