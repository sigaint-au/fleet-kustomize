# Production ExternalSecret for Perses Zitadel OIDC.
# This file is included via overlays/production (which pulls in ../../base).
# Development uses its own definition in overlays/development/external-secret.yaml
# with development-specific Doppler keys.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: perses-zitadel-oidc
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: perses-zitadel-oidc
    creationPolicy: Owner
  data:
    # The Perses Helm chart generates env entries for the OIDC providers
    # (based on config.security.authentication.providers.oidc) using:
    #   valueFrom:
    #     secretKeyRef:
    #       key: <PERSES_NAME | kebabcase>
    #
    # Therefore the Secret we create must contain keys like:
    #   perses-security-authentication-providers-oidc-0-client-id
    #   perses-security-authentication-providers-oidc-0-client-secret
    #
    # Values are pulled from Doppler using the friendly remote keys below.
    - secretKey: perses-security-authentication-providers-oidc-0-client-id
      remoteRef:
        key: PERSES_ZITADEL_OIDC_CLIENT_ID
    - secretKey: perses-security-authentication-providers-oidc-0-client-secret
      remoteRef:
        key: PERSES_ZITADEL_OIDC_CLIENT_SECRET
    # This is a non-secret flag (enables native authorization provider so
    # group-based RoleBindings work). We provide it as a static value here
    # because the Perses chart, when using secret.name, generates
    # secretKeyRef entries using kebab-cased versions of every env var name
    # that appears in mergedEnvVars (including those from the envVars list).
    # Non-secret boolean flag. We pull it from Doppler (create the key
    # PERSES_AUTHORIZATION_NATIVE_ENABLE with value "true" in Doppler)
    # so it follows the same remoteRef pattern and satisfies the ExternalSecret CRD schema.
    - secretKey: perses-security-authorization-native-enable
      remoteRef:
        key: PERSES_AUTHORIZATION_NATIVE_ENABLE
