# Production ExternalSecret for Perses Zitadel OIDC.
# This file is included via overlays/production (which pulls in ../../base).
# Development uses its own definition in overlays/development/external-secret.yaml
# with development-specific Doppler keys.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: perses-zitadel-oidc
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: perses-zitadel-oidc
    creationPolicy: Owner
  data:
    # These keys become environment variable names injected into the Perses pod.
    # Perses uses the PERSES_<YAML_PATH> convention to override config.
    - secretKey: PERSES_SECURITY_AUTHENTICATION_PROVIDERS_OIDC_0_CLIENT_ID
      remoteRef:
        key: PERSES_ZITADEL_OIDC_CLIENT_ID
    - secretKey: PERSES_SECURITY_AUTHENTICATION_PROVIDERS_OIDC_0_CLIENT_SECRET
      remoteRef:
        key: PERSES_ZITADEL_OIDC_CLIENT_SECRET
