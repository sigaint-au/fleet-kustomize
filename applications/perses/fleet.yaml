# fleet.yaml
---
# Perses observability dashboards.
# Requires the supporting bundle at applications/perses/config/
# (environment overlays provide Zitadel OIDC client credentials via ExternalSecret).
defaultNamespace: monitoring
labels:
  component: perses-install

helm:
  repo: https://perses.github.io/helm-charts
  version: 0.53.1
  releaseName: perses

targetCustomizations:
  - name: k3s-lhm-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-lhm-prod
    helm:
      valuesFiles:
        - values/production.yaml

  - name: k3s-lhm-devel
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-lhm-devel
    helm:
      valuesFiles:
        - values/development.yaml

  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true

dependsOn:
  - selector:
      matchLabels:
        component: perses-config
