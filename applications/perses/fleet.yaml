# fleet.yaml
---
defaultNamespace: monitoring
labels:
  component: perses-install

helm:
  repo: https://perses.github.io/helm-charts
  version: 0.53.1
  releaseName: perses
  valuesFiles:
    - values/production.yaml

targetCustomizations:
  # Perses only on production downstream clusters (uses root production values).
  # Single matchExpressions IN since no per-cluster specific config in the customizations.
  - name: production-downstream
    clusterSelector:
      matchExpressions:
        - key: sigaint.au/cluster-id
          operator: In
          values:
            - k3s-lhm-prod
            - k3s-lhm-devel

  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
