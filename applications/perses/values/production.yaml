# Values for Perses on production downstream clusters (k3s-lhm-prod, k3s-lhm-devel).
#
# Chart: https://perses.github.io/helm-charts (perses/perses)
#
# OIDC is configured to use Zitadel. Client ID and secret are delivered via
# ExternalSecret (see applications/perses/config/overlays/production) from Doppler.
#
# IMPORTANT: We request "profile" scope (for preferred_username) but NOT "email" scope,
# so Perses uses preferred_username (e.g. "mhahl-a") as the user subject name for RBAC bindings
# instead of email.
#
# The Perses Helm chart auto-generates env entries (for OIDC client secrets + any
# entries from the envVars list below) and references them via secretKeyRef using
# the kebab-cased version of the PERSES_ name. All such keys must exist in the
# external Secret (perses-zitadel-oidc). Examples:
#   perses-security-authentication-providers-oidc-0-client-id
#   perses-security-authorization-native-enable
#
# These env vars override the config at runtime using Perses' PERSES_ convention.
#
# Authorization / permissions (using OIDC groups from Zitadel, Perses inbuilt RBAC only):
# - Native provider enabled via PERSES_SECURITY_AUTHORIZATION_NATIVE_ENABLE env var.
# - guest_permissions left empty.
# - RBAC objects (GlobalRole + GlobalRoleBindings for rol-perses-access and rol-perses-admin, plus direct for mhahl-a using preferred_username)
#   are delivered via extraObjects ConfigMap (labeled for sidecar) + sidecar provisioning into the folder.
#   No Kubernetes native RBAC is used for Perses user permissions (only inbuilt Perses GlobalRole/GlobalRoleBinding).
# - IMPORTANT: For groups to be picked up, the OIDC token must contain a "groups" claim (array of strings like ["rol-perses-access", "rol-perses-admin"]).
#   This usually requires a Zitadel Action to set the claim from the user's roles. Re-login after changes.
#
# Datasources configured for VictoriaMetrics + Victoria Logs (see below for details).

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: le-production
  hosts:
    - host: perses.sigaint.au
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: perses-sigaint-au-tls
      hosts:
        - perses.sigaint.au

persistence:
  enabled: true
  size: 10Gi
  storageClass: harvester

replicas: 1

config:
  security:
    enable_auth: true
    cookie:
      same_site: lax
      secure: true

    authentication:
      providers:
        oidc:
          - slug_id: zitadel
            name: "Single Sign On"
            issuer: "https://auth.sigaint.au"
            redirect_uri: "https://perses.sigaint.au/api/auth/providers/oidc/zitadel/callback"
            scopes: ["openid", "profile", "groups"]
            logout:
              enabled: true

    # Authorization (RBAC) for logged-in users coming from Zitadel OIDC.
    # guest_permissions must be placed directly here due to the Helm chart's values.schema.json
    # (it rejects 'provider' or 'native' under authorization).
    # The native provider itself is enabled via the PERSES_ env var (see envVars below).
    authorization:
      guest_permissions: []   # access is controlled exclusively via the GlobalRoleBindings provisioned below

  # provisioning is at the config level (sibling to security), not under security.
  # This is required by the chart schema.
  provisioning:
    folders:
      - /etc/perses/provisioning
      - /etc/perses/provisioning/rbac   # mounted ConfigMap with Perses RBAC objects (GlobalRole, GlobalRoleBindings)

# Datasources for VictoriaMetrics and Victoria Logs (both deployed in the monitoring namespace).
# - VictoriaMetrics uses the Prometheus-compatible API on vmselect.
# - Victoria Logs uses the Loki-compatible API (port 9428).
#
# The victoria-metrics-cluster chart (release: vmcluster) creates the vmselect service.
# Victoria Logs is typically exposed as the "vlogs" service (from victoria-logs-single or similar).
datasources:
  - kind: GlobalDatasource
    metadata:
      name: VictoriaMetrics
    spec:
      default: true
      plugin:
        kind: PrometheusDatasource
        spec:
          directUrl: http://vmcluster-vmselect:8481/select/0/prometheus
  - kind: GlobalDatasource
    metadata:
      name: VictoriaLogs
    spec:
      plugin:
        kind: LokiDatasource
        spec:
          directUrl: http://vlogs:9428

secret:
  create: false
  name: perses-zitadel-oidc

envVars:
  - name: PERSES_SECURITY_AUTHORIZATION_NATIVE_ENABLE
    value: "true"

# Mount the RBAC ConfigMap (created via extraObjects) into the provisioning folder.
# This lets Perses' built-in provisioning load the GlobalRole and GlobalRoleBindings
# on startup/interval. No sidecar (and thus no extra Kubernetes RBAC) is used.
volumes:
  - name: perses-rbac
    configMap:
      name: perses-global-rbac

volumeMounts:
  - name: perses-rbac
    mountPath: /etc/perses/provisioning/rbac

# Extra objects: provision GlobalRole + RoleBindings using OIDC groups from Zitadel (and direct user for mhahl-a).
# - rol-perses-access group : basic read/login access (via custom GlobalRole "perses-access")
# - rol-perses-admin group  : full global-admin (via built-in role)
# - mhahl-a user            : full global-admin (direct, as fallback)
extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: perses-global-rbac
      labels:
        perses.dev/resource: "true"
    data:
      00-global-role-perses-access.yaml: |
        kind: GlobalRole
        metadata:
          name: perses-access
        spec:
          permissions:
            - actions: ["read"]
              scopes: ["*"]
      01-global-role-binding-perses-access.yaml: |
        kind: GlobalRoleBinding
        metadata:
          name: perses-access-users
        spec:
          role: perses-access
          subjects:
            - kind: Group
              name: rol-perses-access
      02-global-role-binding-perses-admin.yaml: |
        kind: GlobalRoleBinding
        metadata:
          name: perses-admin-users
        spec:
          role: global-admin
          subjects:
            - kind: Group
              name: rol-perses-admin
      03-global-role-binding-mhahl-a.yaml: |
        kind: GlobalRoleBinding
        metadata:
          name: mhahl-a-admin
        spec:
          role: global-admin
          subjects:
            - kind: User
              name: mhahl-a
