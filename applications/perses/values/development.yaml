# Values for Perses on the development cluster (k3s-lhm-devel).
#
# Chart: https://perses.github.io/helm-charts (perses/perses)
#
# OIDC is configured to use Zitadel. Client ID and secret are delivered via
# ExternalSecret (see applications/perses/config/overlays/development) from Doppler
# and injected as environment variables.

ingress:
  enabled: true
  annotations:
    # cert-manager will handle TLS via ClusterIssuer
    cert-manager.io/cluster-issuer: le-production
  hosts:
    - host: perses.apps.k3s.lhm.devel.sigaint.au
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: perses-sigaint-au-tls
      hosts:
        - perses.apps.k3s.lhm.devel.sigaint.au

persistence:
  enabled: true
  size: 10Gi
  storageClass: local-path

replicas: 1

config:
  security:
    enable_auth: true
    cookie:
      same_site: lax
      secure: true

    authentication:
      providers:
        oidc:
          - slug_id: zitadel
            name: "Single Sign On"
            issuer: "https://auth.sigaint.au"
            redirect_uri: "https://perses.apps.k3s.lhm.devel.sigaint.au/api/auth/providers/oidc/zitadel/callback"
            scopes: ["openid", "profile", "email"]
            logout:
              enabled: true

secret:
  create: false
  name: perses-zitadel-oidc
