# Values for Perses on the development cluster (k3s-lhm-devel).
#
# Chart: https://perses.github.io/helm-charts (perses/perses)
#
# OIDC is configured to use Zitadel. Client ID and secret are delivered via
# ExternalSecret (see applications/perses/config/overlays/development) from Doppler.
#
# The Perses Helm chart auto-generates env entries for the OIDC providers
# (from the authentication.providers.oidc list) and references them via
# secretKeyRef. The keys in the Secret must be kebab-cased versions of the
# PERSES_ names, e.g.:
#   perses-security-authentication-providers-oidc-0-client-id
#   perses-security-authentication-providers-oidc-0-client-secret
#
# These env vars override the config at runtime using Perses' PERSES_ convention.
#
# Authorization / permissions (using OIDC groups from Zitadel):
# - Native provider (guest_permissions empty — access is group-based only).
# - Sidecar + extraObjects ConfigMap provisions:
#     rol-perses-access  → perses-access role (read/login)
#     rol-perses-admin   → global-admin (full admin)
#
# Datasources configured for VictoriaMetrics + Victoria Logs (see below for details).

ingress:
  enabled: true
  annotations:
    # cert-manager will handle TLS via ClusterIssuer
    cert-manager.io/cluster-issuer: le-production
  hosts:
    - host: perses.apps.k3s.lhm.devel.sigaint.au
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: perses-sigaint-au-tls
      hosts:
        - perses.apps.k3s.lhm.devel.sigaint.au

persistence:
  enabled: true
  size: 10Gi
  storageClass: harvester

replicas: 1

config:
  security:
    enable_auth: true
    cookie:
      same_site: lax
      secure: true

    authentication:
      providers:
        oidc:
          - slug_id: zitadel
            name: "Single Sign On"
            issuer: "https://auth.sigaint.au"
            redirect_uri: "https://perses.apps.k3s.lhm.devel.sigaint.au/api/auth/providers/oidc/zitadel/callback"
            scopes: ["openid", "profile", "email"]
            logout:
              enabled: true

    # Authorization (RBAC) for logged-in users coming from Zitadel OIDC.
    # guest_permissions are now empty: only users who are members of the
    # configured OIDC groups (via RoleBindings below) will have access.
    authorization:
      provider:
        native:
          enable: true
          guest_permissions: []   # no access without explicit group binding

# Datasources for VictoriaMetrics and Victoria Logs (both deployed in the monitoring namespace).
# - VictoriaMetrics uses the Prometheus-compatible API on vmselect.
# - Victoria Logs uses the Loki-compatible API (port 9428).
#
# The victoria-metrics-cluster chart (release: vmcluster) creates the vmselect service.
# Victoria Logs is typically exposed as the "vlogs" service (from victoria-logs-single or similar).
datasources:
  - kind: GlobalDatasource
    metadata:
      name: VictoriaMetrics
    spec:
      default: true
      plugin:
        kind: PrometheusDatasource
        spec:
          directUrl: http://vmcluster-vmselect:8481/select/0/prometheus
  - kind: GlobalDatasource
    metadata:
      name: VictoriaLogs
    spec:
      plugin:
        kind: LokiDatasource
        spec:
          directUrl: http://vlogs:9428

secret:
  create: false
  name: perses-zitadel-oidc

# Enable sidecar for provisioning resources (including RBAC RoleBindings)
# from ConfigMaps labeled with perses.dev/resource: "true".
# This allows declarative management of permissions.
sidecar:
  enabled: true
  label: "perses.dev/resource"
  labelValue: "true"
  allNamespaces: true  # watch for resource ConfigMaps (including in this namespace)

# Extra objects: provision GlobalRole + RoleBindings using OIDC groups from Zitadel.
# - rol-perses-access : basic read/login access
# - rol-perses-admin  : full global administrator access
extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: perses-global-rbac
      labels:
        perses.dev/resource: "true"
    data:
      perses-rbac.yaml: |
        # Base role for users who should be able to log in and view
        kind: GlobalRole
        metadata:
          name: perses-access
        spec:
          permissions:
            - actions: ["read"]
              scopes: ["*"]
        ---
        # Bind the access group (users in this Zitadel group can log in with read access)
        kind: GlobalRoleBinding
        metadata:
          name: perses-access-users
        spec:
          role: perses-access
          subjects:
            - kind: Group
              name: rol-perses-access
        ---
        # Bind the admin group to the built-in global-admin role
        kind: GlobalRoleBinding
        metadata:
          name: perses-admin-users
        spec:
          role: global-admin
          subjects:
            - kind: Group
              name: rol-perses-admin
