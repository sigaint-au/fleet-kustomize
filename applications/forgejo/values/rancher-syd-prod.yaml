# Values for Forgejo on git.sigaint.au (rancher-syd-prod cluster)
#
# Chart: oci://code.forgejo.org/forgejo-helm/forgejo
#
# Note: The Helm chart is deployed via Fleet's native helm: section (see fleet.yaml).
# Supporting resources (ExternalSecrets for LDAP, admin, and mailer config)
# are deployed from applications/forgejo/config/base/ as a separate bundle.
#
# Mailer config is injected securely via additionalConfigSources + a dedicated
# ExternalSecret (see explanation in the additionalConfigSources section below
# and the ExternalSecret definitions).

gitea:
  admin:
    existingSecret: forgejo-admin-external
    passwordMode: keepUpdated

  config:
    server:
      DOMAIN: git.sigaint.au
      ROOT_URL: https://git.sigaint.au/
      PROTOCOL: http   # TLS terminated at Ingress

    security:
      # Trust the FreeIPA CA certificate (mounted from the ExternalSecret-managed Secret below)
      CA_CERTS: /data/freeipa-ca/ca.crt

  # Mount FreeIPA CA certificate from the Secret populated by External Secrets Operator
  extraVolumes:
    - name: freeipa-ca
      secret:
        secretName: forgejo-ldap-bind
        items:
          - key: ca.crt
            path: ca.crt

  extraVolumeMounts:
    - name: freeipa-ca
      mountPath: /data/freeipa-ca
      readOnly: true

  # additionalConfigSources lets the chart mount extra Secrets/ConfigMaps.
  # Their keys (named in FORGEJO__section__KEY format) are turned into env vars
  # by the init container and merged into app.ini via environment-to-ini.
  # This is the secure way to provide sensitive config like mailer passwords
  # without plaintext in Git/values.
  #
  # Here we include:
  # - gitea-app-ini-additional : (expected to exist; holds other custom app.ini bits,
  #   e.g. OAuth, not managed in this repo's ExternalSecrets yet)
  # - forgejo-mailer-config    : populated by the ExternalSecret below for [mailer] settings.
  additionalConfigSources:
    - secret:
        secretName: forgejo-mailer-config
    - secret:
        secretName: forgejo-storage-config

ingress:
  enabled: true
  annotations:
    # cert-manager will handle TLS via ClusterIssuer
    cert-manager.io/cluster-issuer: le-production
  hosts:
    - host: git.sigaint.au
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: git-sigaint-au-tls
      hosts:
        - git.sigaint.au

# Minimal persistence (adjust storageClass if needed)
persistence:
  enabled: true
  size: 20Gi

# Use a single replica for minimal deployment
replicaCount: 1
