apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-ldap-bind
  namespace: forgejo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: forgejo-ldap-bind
    creationPolicy: Owner
  data:
    - secretKey: bind-password
      remoteRef:
        # Doppler key for the LDAP bind password
        key: LDAP_BIND_PASSWORD
    - secretKey: ca.crt
      remoteRef:
        # Doppler key for the FreeIPA CA certificate (PEM format)
        key: LDAP_BIND_CA_CERT

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin
  namespace: forgejo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: forgejo-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        # Create this key in Doppler (e.g. FORGEJO_ADMIN_PASSWORD)
        key: FORGEJO_ADMIN_PASSWORD

# This file is deployed from applications/forgejo/config/base/
# as a separate Fleet bundle (see config/base/fleet.yaml).
# The main Forgejo Helm chart is deployed via the helm: section in ../fleet.yaml.
#
# Doppler keys expected:
#   - LDAP_BIND_PASSWORD
#   - LDAP_BIND_CA_CERT
#   - FORGEJO_ADMIN_PASSWORD   (for the initial admin user)
