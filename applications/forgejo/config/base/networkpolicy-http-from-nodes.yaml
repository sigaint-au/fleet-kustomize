# HTTP backend (TCP 3000) for Traefik Ingress.
#
# rancher-syd-prod Traefik uses hostNetwork. Observed source IPs:
#   - Same node as backend: node InternalIP / VIP
#   - Cross-node via flannel wireguard: flannel-wg address (10.42.x.0/32),
#     NOT the node public IP — node-IP-only allows cause intermittent 502s.
#
# git.sigaint.au is public via Ingress; allow any source on 3000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-forgejo-http-from-nodes
  labels:
    sigaint.au/network-policy: app
    app.kubernetes.io/name: forgejo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
        - ipBlock:
            cidr: ::/0
      ports:
        - protocol: TCP
          port: 3000
