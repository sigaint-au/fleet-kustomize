# Ingress-only baseline for the forgejo namespace.
# Egress is unrestricted so LDAP / SMTP / storage / registries keep working.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    sigaint.au/network-policy: baseline
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace-ingress
  labels:
    sigaint.au/network-policy: baseline
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-traefik
  labels:
    sigaint.au/network-policy: baseline
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Pod-network Traefik. hostNetwork Traefik (rancher-syd) needs node ipBlocks
        # (see networkpolicy-http-from-nodes.yaml).
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
