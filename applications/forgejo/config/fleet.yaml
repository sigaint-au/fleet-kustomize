# fleet.yaml for supporting resources (ExternalSecret, Namespace)
# This bundle should be targeted separately from the main Helm chart.
#
# The main Forgejo Helm chart depends on this bundle via component: forgejo-config.
#
# This bundle creates:
#   - forgejo namespace
#   - forgejo-ldap-bind secret (LDAP bind password + FreeIPA CA cert)
#   - forgejo-admin secret (initial admin password)

defaultNamespace: forgejo
labels:
  component: forgejo-config

targetCustomizations:
  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: rancher-syd-prod
    kustomize:
      dir: overlays/clusters/syd-rancher-prod

  # Supporting config only for rancher-syd-prod (kustomize dir above).
  # Catch-all excludes k3s clusters, local mgmt cluster, and anything else.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true