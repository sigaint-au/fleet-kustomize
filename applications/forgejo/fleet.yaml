defaultNamespace: forgejo
labels:
  component: forgejo-install

targetCustomizations:
  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: rancher-syd-prod
    helm:
      chart: oci://code.forgejo.org/forgejo-helm/forgejo
      version: 17.1.0
      releaseName: forgejo
      valuesFiles:
        - values/rancher-syd-prod.yaml

dependsOn:
  - selector:
      matchLabels:
        component: forgejo-config