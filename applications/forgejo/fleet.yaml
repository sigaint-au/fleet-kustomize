# Forgejo (Git) deployment for the Sydney cluster.
#
# Requires the supporting bundle at applications/forgejo/config/
# (creates Namespace + ExternalSecrets for LDAP + admin password).
defaultNamespace: forgejo
labels:
  component: forgejo-install

targetRestrictions:
  - clusterSelector:
      matchExpressions:
        - key:  sigaint.au/cluster-id
          operator: NotIn
          values:
            - k3s-prod-lhm
            - k3s-devel-lhm

targetCustomizations:

  - name: k3s-prod-lhm
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-prod-lhm

  - name: k3s-devel-lhm
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-devel-lhm

  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: rancher-syd-prod
    helm:
      chart: oci://code.forgejo.org/forgejo-helm/forgejo
      version: 17.1.0
      releaseName: forgejo
      valuesFiles:
        - values/rancher-syd-prod.yaml

dependsOn:
  - selector:
      matchLabels:
        component: forgejo-config