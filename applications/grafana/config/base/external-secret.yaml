apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: GRAFANA_ADMIN_USER
    - secretKey: admin-password
      remoteRef:
        key: GRAFANA_ADMIN_PASSWORD

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-ldap-bind
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: grafana-ldap-bind
    creationPolicy: Owner
  data:
    - secretKey: bind-password
      remoteRef:
        key: LDAP_BIND_PASSWORD
    - secretKey: ca.crt
      remoteRef:
        key: LDAP_BIND_CA_CERT
    # For the GF_LDAP_BIND_PASSWORD env var used in ldap.toml (injected via envFromSecret)
    - secretKey: GF_LDAP_BIND_PASSWORD
      remoteRef:
        key: LDAP_BIND_PASSWORD
