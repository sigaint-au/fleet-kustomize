# Grafana shares the monitoring namespace with other workloads (e.g. VictoriaMetrics).
# Do NOT apply namespace-wide default-deny here — use podSelectors for Grafana only.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-default-deny-ingress
  labels:
    sigaint.au/network-policy: app
    app.kubernetes.io/name: grafana
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-allow-from-traefik
  labels:
    sigaint.au/network-policy: app
    app.kubernetes.io/name: grafana
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    # k3s-lhm Traefik is LoadBalancer / pod network — namespaceSelector is enough.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-allow-same-namespace
  labels:
    sigaint.au/network-policy: app
    app.kubernetes.io/name: grafana
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
