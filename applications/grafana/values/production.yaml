# Values for Grafana on production (k3s-lhm-prod)
#
# Chart: https://grafana.github.io/helm-charts (grafana)
#
# OIDC auth via Zitadel. Secrets via ExternalSecret from Doppler.
# Datasources for VictoriaMetrics (Prometheus compat) and VictoriaLogs (Loki compat).
#
# Recommended pattern (per grafana/helm-charts issues + community):
# - Secret keys named exactly GF_... so `envFromSecret: grafana-oidc` works (clean, no per-var valueFrom in git).
# - Use $__env{GF_...} (or ${}) placeholders in grafana.ini for Grafana's runtime substitution.
# - The Go template + single quotes around the expression is only to keep raw values.yaml valid
#   under Fleet's Go template pre-rendering + strict YAML parsing.
# Values are flat (no 'grafana:' wrapper) to match the chart.

admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

grafana.ini:
  server:
    root_url: https://grafana.sigaint.au/
  auth.generic_oauth:
    enabled: true
    name: "Single Sign On"
    client_id: '${__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}'
    client_secret: '${__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}'
    scopes: "openid profile email"
    auth_url: https://auth.sigaint.au/oauth/v2/authorize
    token_url: https://auth.sigaint.au/oauth/v2/token
    api_url: https://auth.sigaint.au/oidc/v1/userinfo
    allow_sign_up: true
    # Add role mapping if using groups from Zitadel, e.g.
    # role_attribute_path: contains(groups[*], 'grafana-admin') && 'Admin' || contains(groups[*], 'grafana-editor') && 'Editor' || 'Viewer'

envFromSecret: grafana-oidc

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://vmcluster-vmselect:8481/select/0/prometheus
        isDefault: true
        jsonData:
          httpMethod: POST
      - name: VictoriaLogs
        type: loki
        access: proxy
        url: http://vlogs:9428
        jsonData:
          maxLines: 1000

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: le-production
  hosts:
    - host: grafana.sigaint.au
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: grafana-sigaint-au-tls
      hosts:
        - grafana.sigaint.au

persistence:
  enabled: true
  size: 10Gi
  storageClassName: harvester

# Use sidecar for config if needed, but datasources via values ok.
