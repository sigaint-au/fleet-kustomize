# Values for Grafana on development (k3s-lhm-devel)
#
# Chart: https://grafana.github.io/helm-charts (grafana)
#
# LDAP auth (FreeIPA-style, replacing OIDC). Bind credentials (LDAP_BIND_PASSWORD) and CA cert (LDAP_BIND_CA_CERT) via ExternalSecret from Doppler (grafana-ldap-bind secret).
# Datasources for VictoriaMetrics (Prometheus compat) and VictoriaLogs (Loki compat).
# LDAP group mappings in ldap.toml:
# - grp-sigaint-admins -> Admin role
# - grp-sigaint-users -> Viewer role
#
# Recommended pattern (per grafana/helm-charts issues + community):
# - Secret keys named exactly GF_... so `envFromSecret: grafana-ldap-bind` works (clean).
# - LDAP bind password injected via env.
# - CA cert mounted for LDAPS.
# Values are flat (no 'grafana:' wrapper) to match the chart.

admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

grafana.ini:
  server:
    root_url: https://grafana.apps.k3s.lhm.devel.sigaint.au/
  auth.ldap:
    enabled: true
    config_file: /etc/grafana/ldap.toml
    allow_sign_up: true

ldap:
  enabled: true
  config: |
    [[servers]]
    host = "idm-8b64.de.sigaint.au"
    port = 636
    use_ssl = true
    start_tls = false
    ssl_skip_verify = false
    root_ca_cert = "/etc/grafana/ldap-ca/ca.crt"
    bind_dn = "uid=perses-bind,cn=users,cn=accounts,dc=sigaint,dc=au"
    bind_password = "$__env{GF_LDAP_BIND_PASSWORD}"
    search_base_dns = ["cn=users,cn=accounts,dc=sigaint,dc=au"]
    search_filter = "(&(objectClass=posixAccount)(uid=%s))"
    group_search_base_dns = ["cn=groups,cn=accounts,dc=sigaint,dc=au"]
    group_search_filter = "(&(objectClass=posixGroup)(member=%s))"
    [servers.attributes]
    name = "givenName"
    surname = "sn"
    username = "uid"
    member_of = "memberOf"
    email = "mail"
    [[servers.group_mappings]]
    group_dn = "cn=grp-sigaint-admins,cn=groups,cn=accounts,dc=sigaint,dc=au"
    org_role = "Admin"
    [[servers.group_mappings]]
    group_dn = "cn=grp-sigaint-users,cn=groups,cn=accounts,dc=sigaint,dc=au"
    org_role = "Viewer"

envFromSecret: grafana-ldap-bind

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://vmcluster-victoria-metrics-cluster-vmselect:8481/select/0/prometheus
        isDefault: true
        jsonData:
          httpMethod: POST
      - name: VictoriaLogs
        type: loki
        access: proxy
        url: http://vlogs:9428
        jsonData:
          maxLines: 1000

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: le-production
  hosts:
    - grafana.apps.k3s.lhm.devel.sigaint.au
  path: /
  pathType: Prefix
  tls:
    - secretName: grafana-k3s-lhm-devel-tls
      hosts:
        - grafana.apps.k3s.lhm.devel.sigaint.au

persistence:
  enabled: true
  size: 10Gi
  storageClassName: harvester

# Mount LDAP CA cert from the secret (for LDAPS)
volumes:
  - name: ldap-ca
    secret:
      secretName: grafana-ldap-bind
      items:
        - key: ca.crt
          path: ca.crt

volumeMounts:
  - name: ldap-ca
    mountPath: /etc/grafana/ldap-ca
    readOnly: true
