# fleet.yaml
---
defaultNamespace: monitoring
labels:
  component: vmcluster-install
helm:
  repo: https://victoriametrics.github.io/helm-charts/
  version: '*'
  chart: victoria-metrics-cluster
  releaseName: vmcluster


targetCustomizations:
  - name: production
    clusterSelector:
      matchLabels:
        sigaint.au/environment: production
    helm:
      valuesFiles:
        - values/production.yaml

  - name: development
    clusterSelector:
      matchLabels:
        sigaint.au/environment: development
    helm:
      valuesFiles:
        - values/development.yaml
