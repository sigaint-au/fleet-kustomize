# fleet.yaml
---
defaultNamespace: monitoring
labels:
  component: vmcluster-install
helm:
  repo: https://victoriametrics.github.io/helm-charts/
  version: 0.42.0
  chart: victoria-metrics-cluster
  releaseName: vmcluster

targetCustomizations:
  - name: k3s-lhm-prod
    clusterSelector:
      matchExpressions:
        - key: sigaint.au/cluster-id
          operator: In
          values:
            - k3s-lhm-prod
    helm:
      valuesFiles:
        - values/production.yaml

  - name: k3s-lhm-devel
    clusterSelector:
      matchExpressions:
        - key: sigaint.au/cluster-id
          operator: In
          values:
            - k3s-lhm-devel
    helm:
      valuesFiles:
        - values/development.yaml

  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true

dependsOn:
  - selector:
      matchLabels:
        component: vmcluster-config
