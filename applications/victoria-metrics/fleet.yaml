# fleet.yaml
---
defaultNamespace: monitoring
labels:
  component: vmcluster-install
helm:
  repo: https://victoriametrics.github.io/helm-charts/
  version: 0.42.0
  chart: victoria-metrics-cluster
  releaseName: vmcluster


targetCustomizations:
  - name: production
    clusterSelector:
      matchLabels:
        sigaint.au/environment: production
    helm:
      valuesFiles:
        - values/production.yaml

  - name: development
    clusterSelector:
      matchLabels:
        sigaint.au/environment: development
    helm:
      valuesFiles:
        - values/development.yaml

  # victoria-metrics by environment on downstream clusters (env overrides above).
  # Catch-all excludes local mgmt cluster (and any cluster not matching earlier env selectors).
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
