# fleet.yaml
defaultNamespace: metallb-system
labels:
  component: metallb-operator-install

targetCustomizations:
  - name: k3s-lhm-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-lhm-prod
    helm:
      repo: https://metallb.github.io/metallb
      chart: metallb
      version: 0.16.1
      releaseName: metallb
      valuesFiles:
        - values/production.yaml
      takeOwnership: true

  - name: k3s-lhm-devel
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-lhm-devel
    helm:
      repo: https://metallb.github.io/metallb
      chart: metallb
      version: 0.16.1
      releaseName: metallb
      valuesFiles:
        - values/production.yaml
      takeOwnership: true

  # Only the two k3s-lhm clusters get the MetalLB operator (with their config above).
  # Everything else (rancher-syd-prod, local mgmt cluster, unknowns) hits the
  # catch-all and is not deployed.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true

diff:
  comparePatches:
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      name: metallb-webhook-configuration
      operations:
        - op: remove
          path: /webhooks
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: metallb-webhook-configuration
      operations:
        - op: remove
          path: /webhooks
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: frr-k8s-validating-webhook-configuration
      operations:
        - op: remove
          path: /webhooks