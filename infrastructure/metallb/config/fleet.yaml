# fleet.yaml
targetCustomizations:
  - name: k3s-lhm-prod
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-lhm-prod
    kustomize:
      dir: overlays/clusters/k3s-lhm-prod
  - name: k3s-lhm-devel
    clusterSelector:
      matchLabels:
        sigaint.au/cluster-id: k3s-lhm-devel
    kustomize:
      dir: overlays/clusters/k3s-lhm-devel

  # Only the two k3s-lhm clusters get the MetalLB objects (kustomize dirs above).
  # Everything else (rancher-syd-prod, local mgmt, unknowns) is excluded.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true

dependsOn:
  - selector:
      matchLabels:
        component: metallb-operator-install
