# =============================================
# Merged Velero values for Rancher Application Collection
# =============================================

namespace: velero

# === Credentials ===
credentials:
  useSecret: true
  existingSecret: b2-velero-credentials

# === Core Configuration ===
configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: my-k8s-backups
      config:
        region: us-west-001 =
        s3Url: https://s3.us-west-000.backblazeb2.com
        s3ForcePathStyle: "true"

  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: us-west-000

  # Optional: Make default explicit
  defaultBackupStorageLocation: default

# === Plugins (AWS for Backblaze) ===
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:latest
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# === Node Agent (for PV / FS backups) ===
nodeAgent:
  enabled: true
