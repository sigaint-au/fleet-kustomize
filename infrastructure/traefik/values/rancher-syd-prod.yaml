# traefik-values.yaml
#
# DaemonSet on hostNetwork so Traefik binds dual-stack (IPv4 + IPv6) on each
# node. hostPort alone is IPv4-only when the pod network has no IPv6 (k3s
# flannel default), which is why dig/curl to node AAAA addresses refused :53/:443.
#
# Privileged ports 80/443/53 on hostNetwork.
# Chart default is runAsUser 65532; non-root + NET_BIND_SERVICE still hits
# "bind: permission denied" on :80 in this environment, so run as root and
# re-add NET_BIND_SERVICE after drop:ALL (root without that cap also cannot
# bind <1024).
# hostNetwork requires containerPort == hostPort for every entrypoint.
#
# DNS UDP uses Traefik CRD IngressRouteUDP (Gateway API UDPRoute is not
# implemented by Traefik; use IngressRouteUDP). experimentalChannel needs
# Gateway API experimental CRDs on the cluster first — see README.
#
# Host firewall (IPv4 + IPv6), e.g.:
#   sudo firewall-cmd --permanent --zone=public --add-service=http
#   sudo firewall-cmd --permanent --zone=public --add-service=https
#   sudo firewall-cmd --permanent --zone=public --add-port=53/udp
#   sudo firewall-cmd --reload

deployment:
  enabled: true
  kind: DaemonSet
  # Required with hostNetwork so cluster Service DNS still works.
  dnsPolicy: ClusterFirstWithHostNet

hostNetwork: true

# Chart fails if maxUnavailable is 0 with hostNetwork (default is 0).
# DaemonSet must allow at least one pod down during rolling updates.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

# Override chart defaults (65532 / runAsNonRoot) so we can bind :80/:443/:53.
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true

ports:
  web:
    # hostNetwork: port must equal hostPort (chart validation).
    port: 80
    hostPort: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443
  # Plain DNS (UDP) on host :53 — dual-stack via hostNetwork.
  dns:
    port: 53
    hostPort: 53
    protocol: UDP
    expose:
      default: true
    exposedPort: 53

# hostNetwork exposes traffic on each node; no LoadBalancer/NodePort Service.
service:
  enabled: false

providers:
  kubernetesCRD:
    enabled: true
  kubernetesGateway:
    enabled: true
    # Watches experimental Gateway API types (TCPRoute, TLSRoute, …).
    # Install experimental CRDs before/with Traefik or logs spam
    # "could not find … tlsroutes.gateway.networking.k8s.io". See README.
    experimentalChannel: true

# HTTP Gateway (HTTPRoute). Listener port = web entrypoint (80).
# TCP/TLS listeners can be added later with TCPRoute/TLSRoute (experimental).
gateway:
  enabled: true
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All
