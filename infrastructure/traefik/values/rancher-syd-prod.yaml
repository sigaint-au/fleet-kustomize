# traefik-values.yaml
#
# DaemonSet on hostNetwork so Traefik binds dual-stack (IPv4 + IPv6) on each
# node. hostPort alone is IPv4-only when the pod network has no IPv6 (k3s
# flannel default), which is why dig/curl to node AAAA addresses refused :53/:443.
#
# Privileged ports 80/443/53: non-root + NET_BIND_SERVICE (same pattern as AdGuard).
# hostNetwork requires containerPort == hostPort for every entrypoint.
#
# DNS UDP uses Traefik CRD IngressRouteUDP (Gateway API does not support
# UDP listeners — experimentalChannel only adds TCPRoute/TLSRoute).
#
# Host firewall (IPv4 + IPv6), e.g.:
#   sudo firewall-cmd --permanent --zone=public --add-service=http
#   sudo firewall-cmd --permanent --zone=public --add-service=https
#   sudo firewall-cmd --permanent --zone=public --add-port=53/udp
#   sudo firewall-cmd --reload

deployment:
  enabled: true
  kind: DaemonSet
  # Required with hostNetwork so cluster Service DNS still works.
  dnsPolicy: ClusterFirstWithHostNet

hostNetwork: true

# Bind privileged ports as non-root (chart default uid 65532).
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true

ports:
  web:
    # hostNetwork: port must equal hostPort (chart validation).
    port: 80
    hostPort: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443
  # Plain DNS (UDP) on host :53 — dual-stack via hostNetwork.
  dns:
    port: 53
    hostPort: 53
    protocol: UDP
    expose:
      default: true
    exposedPort: 53

# hostNetwork exposes traffic on each node; no LoadBalancer/NodePort Service.
service:
  enabled: false

providers:
  kubernetesCRD:
    enabled: true
  kubernetesGateway:
    enabled: true
    # TCPRoute/TLSRoute only — not UDP.
    experimentalChannel: true

# HTTP Gateway only (no UDP listeners — unsupported by kubernetesgateway).
# Listener port must match the web entrypoint container port (80).
gateway:
  enabled: true
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All
