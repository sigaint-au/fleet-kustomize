# traefik-values.yaml
#
# DaemonSet with hostPort (not hostNetwork): process binds unprivileged
# container ports; kubelet maps host 80/443/53 → those ports. Avoids
# "bind: permission denied" as non-root on privileged ports.
#
# DNS UDP uses Traefik CRD IngressRouteUDP (Gateway API does not support
# UDP listeners — experimentalChannel only adds TCPRoute/TLSRoute).

deployment:
  enabled: true
  kind: DaemonSet

hostNetwork: false

ports:
  web:
    port: 8000
    hostPort: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443
  # Plain DNS (UDP). Container 5353; host :53 via hostPort.
  dns:
    port: 5353
    hostPort: 53
    protocol: UDP
    expose:
      default: true
    exposedPort: 53

# hostPort exposes traffic on each node; no LoadBalancer/NodePort Service.
service:
  enabled: false

providers:
  kubernetesCRD:
    enabled: true
  kubernetesGateway:
    enabled: true
    # TCPRoute/TLSRoute only — not UDP.
    experimentalChannel: true

# HTTP Gateway only (no UDP listeners — unsupported by kubernetesgateway).
gateway:
  enabled: true
  listeners:
    web:
      port: 8000
      protocol: HTTP
      namespacePolicy:
        from: All
