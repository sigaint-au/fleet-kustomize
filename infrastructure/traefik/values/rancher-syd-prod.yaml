# traefik-values.yaml
#
# DaemonSet with hostPort (not hostNetwork): process binds unprivileged
# container ports; kubelet maps host 80/443/53 → those ports. Avoids
# "bind: permission denied" as non-root on privileged ports.

deployment:
  enabled: true
  kind: DaemonSet

## Target the specific node
#nodeSelector:
#  kubernetes.io/hostname: rancher-1894.syd.prod.sigaint.au

# Tolerate the custom taint
tolerations:
  - key: "ingress"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

# Do not use hostNetwork — chart non-root user cannot bind :80/:443/:53.
hostNetwork: false

ports:
  web:
    port: 8000
    hostPort: 80
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443
  # Plain DNS (UDP). Container listens on 5353; host :53 is mapped via hostPort.
  # Gateway listener port must match this container port (not hostPort).
  dns:
    port: 5353
    hostPort: 53
    protocol: UDP
    expose:
      default: true
    exposedPort: 53

# hostPort exposes traffic on each node; no LoadBalancer/NodePort Service.
service:
  enabled: false

providers:
  kubernetesGateway:
    enabled: true
    # Required for UDPRoute / TCPRoute (experimental Gateway API channel).
    experimentalChannel: true

# Default Gateway (traefik-gateway). Listener ports = ports.*.port (container).
gateway:
  enabled: true
  listeners:
    web:
      port: 8000
      protocol: HTTP
      namespacePolicy:
        from: All
    dns:
      port: 5353
      protocol: UDP
      namespacePolicy:
        from: All
