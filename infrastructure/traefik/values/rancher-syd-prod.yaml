# traefik-values.yaml

deployment:
  enabled: true
  kind: DaemonSet
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

## Target the specific node
#nodeSelector:
#  kubernetes.io/hostname: rancher-1894.syd.prod.sigaint.au

# Tolerate the custom taint
tolerations:
  - key: "ingress"
    operator: "equal"
    value: "true"
    effect: "NoSchedule"

# hostNetwork is top-level in the chart (not only under deployment).
hostNetwork: true

# Bind privileged host ports 80/443/53 as non-root.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true

ports:
  web:
    # hostNetwork: hostPort must match port
    port: 80
    hostPort: 80
    expose:
      default: true
  websecure:
    port: 443
    hostPort: 443
    expose:
      default: true
  # Plain DNS (UDP) — Gateway API UDPRoute → AdGuard ClusterIP :53
  dns:
    port: 53
    hostPort: 53
    protocol: UDP
    expose:
      default: true
    exposedPort: 53

# Since we are using hostNetwork, we don't need the K8s Service
# to manage a LoadBalancer/NodePort for us.
service:
  enabled: false

providers:
  kubernetesGateway:
    enabled: true
    # Required for UDPRoute / TCPRoute (experimental Gateway API channel).
    experimentalChannel: true

# Default Gateway (traefik-gateway). Listener ports must match ports.* above.
# HTTPS stays on Ingress (IngressRoute/Ingress); only HTTP + DNS UDP here.
gateway:
  enabled: true
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All
    dns:
      port: 53
      protocol: UDP
      namespacePolicy:
        from: All
