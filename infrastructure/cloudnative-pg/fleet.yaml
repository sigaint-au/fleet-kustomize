# fleet.yaml
defaultNamespace: cnpg-system
labels:
  component: cnpg-install
helm:
  repo: https://cloudnative-pg.github.io/charts
  chart: cloudnative-pg
  version: 0.27.1
  releaseName: cnpg

targetCustomizations:
  # Common operators (root helm) for the downstream clusters.
  # Use a single matchExpressions IN list when there is no per-cluster specific config.
  # Catch-all doNotDeploy excludes local mgmt cluster and everything else.
  - name: downstream-clusters
    clusterSelector:
      matchExpressions:
        - key: sigaint.au/cluster-id
          operator: In
          values:
            - k3s-lhm-prod
            - k3s-lhm-devel
            - rancher-syd-prod

  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true

diff:
  comparePatches:
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      name: cnpg-mutating-webhook-configuration
      operations:
        - op: remove
          path: /webhooks
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: cnpg-mutating-webhook-configuration
      operations:
        - op: remove
          path: /webhooks/0/clientConfig/caBundle
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: cnpg-validating-webhook-configuration
      operations:
        - op: remove
          path: /webhooks