# fleet.yaml
targetCustomizations:
  - name: production
    clusterSelector:
      matchLabels:
        sigaint.au/environment: production
    kustomize:
      dir: overlays/production

  - name: development
    clusterSelector:
      matchLabels:
        sigaint.au/environment: development
    kustomize:
      dir: overlays/development

  # Supporting kustomize resources per env on downstream (env selectors above).
  # Catch-all excludes local mgmt cluster and any non-matching clusters.
  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true

dependsOn:
  - selector:
      matchLabels:
        component: cert-manager-operator-install
  - selector:
      matchLabels:
        component: external-secrets-operator-install