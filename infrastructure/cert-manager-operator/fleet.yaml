# fleet.yaml
defaultNamespace: cert-manager
labels:
  component: cert-manager-operator-install
helm:
  repo: https://charts.jetstack.io
  chart: cert-manager
  version: v1.20.0
  releaseName: cert-manager
  valuesFiles:
    - values/production.yaml

targetCustomizations:
  # Common operators (root helm + values) for the downstream clusters.
  # Use a single matchExpressions IN list when there is no per-cluster specific config.
  # Catch-all doNotDeploy excludes local mgmt cluster and everything else.
  - name: downstream-clusters
    clusterSelector:
      matchExpressions:
        - key: sigaint.au/cluster-id
          operator: In
          values:
            - k3s-lhm-prod
            - k3s-lhm-devel
            - rancher-syd-prod

  - name: exclude-others
    clusterSelector: {}
    doNotDeploy: true
diff:
  comparePatches:
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      name: cert-manager-webhook
      operations:
        - op: remove
          path: /webhooks
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      name: cert-manager-webhook
      operations:
        - op: remove
          path: /webhooks