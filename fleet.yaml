namespace: fleet-kustomize
helm:
  repo: https://charts.external-secrets.io
  chart: external-secrets
  version: 2.3.0
  releaseName: external-secrets
  values:
    installCRDs: true

targetCustomizations:
  - name: rancher-syd-prod
    clusterSelector:
      matchLabels:
        cluster-id: rancher-syd-prod
    kustomize:
      dir: clusters/rancher-syd-prod